plugins { id 'com.android.application' }

android {
    namespace "com.controlcenter.app"
    compileSdk 34

    defaultConfig {
        applicationId "com.controlcenter.app"
        minSdk 21
        targetSdk 34
        versionCode 6
        versionName "6.0"
    }

    buildTypes {
        release { minifyEnabled false }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'
}
