plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.controlcenter'   // Change this if your real package is different
    compileSdk 34

    defaultConfig {
        applicationId "com.example.controlcenter"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
}
