<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
    <h2>ControlCenterOS V6</h2>

    <div class="pages">
        <div class="page active" id="p1">
            <div class="tile" onclick="toggle(this)">WiFi</div>
            <div class="tile" onclick="toggle(this)">Bluetooth</div>
        </div>

        <div class="page" id="p2">
            <div class="tile" onclick="toggle(this)">Airplane</div>
            <div class="tile" onclick="toggle(this)">Dark Mode</div>
        </div>
    </div>

    <button onclick="nextPage()">Switch Page</button>
</div>

<script src="js/app.js"></script>
</body>
</html>
