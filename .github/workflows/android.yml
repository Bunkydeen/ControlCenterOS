name: ControlCenter APK Factory v7 (Production)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant permissions
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew clean assembleRelease

      - name: Sign APK (debug signing fallback if no keystore)
        run: |
          echo "No custom keystore detected - using default debug signing fallback build"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ControlCenter-Release
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: v${{ github.run_number }}
          name: ControlCenter Production v${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
