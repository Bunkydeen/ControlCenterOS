name: ControlCenter Factory v10 (Autonomous)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Bump Version Automatically
        run: bash scripts/bump_version.sh

      - name: Grant permissions
        run: chmod +x gradlew

      - name: Clean Build
        run: ./gradlew clean

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Generate Changelog
        run: |
          echo "Changes in $NEW_VERSION" > changelog.txt
          git log -1 --pretty=format:"%s" >> changelog.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ControlCenter-${{ env.NEW_VERSION }}
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.NEW_CODE }}
          name: ControlCenter ${{ env.NEW_VERSION }}
          body_path: changelog.txt
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
